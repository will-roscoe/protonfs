name: Bug report
description: Report something that is not working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../security/policy)
        for private reporting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. protonfs setup
        2. protonfs push
        3. ...
      render: shell
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`protonfs doctor` output"
      description: >-
        Especially important for keyring/auth/headless issues. Redact anything
        sensitive.
      render: shell
    validations:
      required: false
  - type: input
    id: protonfs-version
    attributes:
      label: protonfs version
      description: Output of `protonfs --version`.
      placeholder: "1.0.1"
    validations:
      required: true
  - type: input
    id: drive-version
    attributes:
      label: proton-drive version
      description: Reported by `protonfs upgrade --check` (or `proton-drive version`).
      placeholder: "0.5.0"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x64
        - Linux arm64
        - macOS arm64 (Apple Silicon)
        - macOS x64 (Intel)
        - Windows (WSL)
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I am running the latest protonfs release (`pip install --upgrade protonfs`).
          required: true
        - label: I searched existing issues for a duplicate.
          required: true

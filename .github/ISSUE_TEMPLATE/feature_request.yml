name: Feature request
description: Suggest a new capability or an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
      placeholder: "I'm trying to … but protonfs currently …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        What you would like protonfs to do. If it affects the CLI surface, note
        the command/option/exit-code you have in mind (this surface is a frozen
        1.0 contract, so additions are considered carefully).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for a similar request.
          required: true

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  # Callable from auto-release.yml after it creates the version tag on merge to main.
  # (A tag pushed with GITHUB_TOKEN cannot trigger the tag-push event above, so the
  # merge-to-main path invokes this workflow directly instead.)
  workflow_call:
    inputs:
      tag:
        description: >-
          Version tag to build and release. REQUIRED from workflow_call: under
          workflow_call github.ref_name is the caller's ref ("main"), not the tag,
          so it must be passed in explicitly. Empty for the tag-push trigger.
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the version tag so hatch-vcs resolves the exact version. On a
          # tag-push trigger inputs.tag is empty and github.ref_name is the tag already.
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true   # hatch-vcs needs the version tag present to resolve the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4      # ← Add this

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Upload gates on the trusted-publisher OIDC identity (works for both the
          # release.yml tag-push path and the auto-release.yml workflow_call path).
          # PEP 740 attestations are disabled: PyPI binds attestation verification to
          # release.yml, so an attestation signed by the auto-release.yml entry workflow
          # is rejected ("Invalid attestations") even though OIDC auth succeeds.
          attestations: false

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4      # ← Add this

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          # inputs.tag under workflow_call (github.ref_name would be "main" there);
          # github.ref_name on a direct tag-push trigger.
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        # A SemVer pre-release tag (v1.1.0-alpha, -beta, -rc[.n]) is marked as a
        # GitHub pre-release so it never becomes the repo's "latest" release.
        run: |
          PRERELEASE_FLAG=""
          case "$RELEASE_TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$RELEASE_TAG" dist/* --generate-notes $PRERELEASE_FLAG

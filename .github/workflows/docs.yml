name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: write so the main-push run can commit the refreshed status graphic
    # (the DOCS card). Read-only would suffice for the PR/build path.
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Graphviz
        # Required by sphinx.ext.inheritance_diagram to render the class-hierarchy graphs.
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: pip install -e ".[docs]"

      - name: Regenerate API stubs
        run: sphinx-apidoc -f -o docs/api/protonfs/ src/protonfs/ --separate --module-first -q

      - name: Build docs
        # -W turns warnings into errors so dangling :option:/:confval:/:envvar:
        # cross-references (and any other doc warning) fail the build; --keep-going
        # collects them all in one run rather than stopping at the first.
        run: sphinx-build -W --keep-going -b html docs/ docs/_build/html

      - name: Doc coverage gate
        # Fail if any documented Python object lacks a docstring, complementing the
        # interrogate docstring-coverage badge. Undocumented items appear as ' * name'
        # lines in python.txt; none means full coverage.
        run: |
          sphinx-build -b coverage docs/ docs/_build/coverage
          if grep -q '^ \* ' docs/_build/coverage/python.txt; then
            echo "Undocumented objects found:"; cat docs/_build/coverage/python.txt; exit 1
          fi
          echo "Doc coverage: no undocumented objects."

      # Refresh the status graphic's DOCS card. Reaching this step means the strict
      # build and the doc-coverage gate both passed, so documentation coverage is 100%
      # (the gate fails on any undocumented object). Only commits on a push to main;
      # update.sh is race-safe against the CI/version/proton-drive status commits.
      - name: Update status graphic
        if: github.ref == 'refs/heads/main'
        env:
          DOCS_COVERAGE: "100"
          DOCS_RESULT: success
          DOCS_WARNINGS: "0"
        run: |
          python .github/status/collect.py docs
          bash .github/status/update.sh .github/status/data/docs.json

      - name: Upload built docs
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 30

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

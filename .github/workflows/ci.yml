name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  # Test across the supported Python versions. No badge/commit side effects here —
  # this job runs 5x in the matrix and must stay side-effect-free.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check src tests --output-format=github
        continue-on-error: true

      - name: Test with coverage (+ junit)
        run: >
          pytest -q
          --cov=src/protonfs --cov-report=term-missing --cov-report=xml:coverage.xml
          --junitxml=junit.xml -o junit_family=legacy
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: will-roscoe/protonfs
          flags: py${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: py${{ matrix.python-version }}

  # Regenerate and commit the committed SVG badges ONCE, from a single canonical
  # Python version, only on a push to main. Split out of the matrix so the badge is
  # deterministic and the git push does not race across five parallel jobs.
  badges:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: badges-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Coverage (single canonical run)
        run: pytest -q --cov=src/protonfs --cov-report=xml:coverage.xml
        continue-on-error: true

      - name: Generate badges
        run: |
          mkdir -p .github/badges
          genbadge coverage -i coverage.xml -o .github/badges/coverage.svg
          interrogate src/protonfs/ -g .github/badges/interrogate-badge.svg || true

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg .github/badges/interrogate-badge.svg
          git diff --cached --quiet || git commit -m "chore: update CI badges [skip ci]"
          git push

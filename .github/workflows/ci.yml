name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check src tests --output-format=github
        continue-on-error: true
      - name: Test with coverage
        run: pytest  -q --cov=src/protonfs --cov-report=term-missing --cov-report=xml:coverage.xml
        continue-on-error: true
      - name: Test generating junit
        run: pytest -q --cov=src/protonfs --junitxml=junit.xml -o junit_family=legacy
        continue-on-error: true
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: will-roscoe/protonfs
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o .github/badges/coverage.svg

      - name: Generate interrogate badge
        run: interrogate src/protonfs/ -g .github/badges/interrogate-badge.svg
        continue-on-error: true

      - name: Commit updated badges
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg .github/badges/interrogate-badge.svg
          git diff --cached --quiet || git commit -m "chore: update CI badges [skip ci]"
          git push

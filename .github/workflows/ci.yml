name: CI

on:
  # PRs always run the matrix. Pushes to main only run it when something that can
  # affect tests changed (Python sources, deps, or this workflow) — not on badge/
  # README/docs-only commits.
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      skip-badges:
        description: >-
          Skip the badge-commit job. Defaults true for workflow_call: auto-release
          calls this workflow as its pre-tag release gate (issue #11) while ci.yml's
          own push trigger runs the badges job for the same commit — running it in
          both would race two badge commits.
        required: false
        type: boolean
        default: true

jobs:
  # Test across the supported Python versions. No badge/commit side effects here —
  # this job runs 5x in the matrix and must stay side-effect-free.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Lint
        run: ruff check src tests --output-format=github
        continue-on-error: true

      # This step GATES the workflow (issue #11): test failures or coverage below
      # the floor fail CI. Codecov uploads still run via `if: !cancelled()` below.
      - name: Test with coverage (+ junit)
        run: >
          pytest -q
          --cov=src/protonfs --cov-report=term-missing --cov-report=xml:coverage.xml
          --cov-fail-under=80
          --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: will-roscoe/protonfs
          flags: py${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: py${{ matrix.python-version }}

  # linux-arm64 run (one canonical Python): protonfs supports the linux-arm64
  # proton-drive prebuilt, so the suite is exercised on a real arm64 runner too.
  # linux-x64 coverage comes from the version matrix above.
  test-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Test
        run: pytest -q

  # darwin-arm64 run (one canonical Python): protonfs supports the darwin-arm64
  # proton-drive prebuilt (#8), and macos-latest is an Apple Silicon (arm64) image
  # as of the runner-images macOS 15 migration.
  test-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Test
        run: pytest -q

  # darwin-x64 run (one canonical Python): protonfs supports the darwin-x64
  # proton-drive prebuilt (#8) too. `macos-15-intel` is the current *standard*
  # (free-for-public-repos) Intel image label -- distinct from the `-large`/
  # `-xlarge` larger-runner labels, which are billed even on public repos.
  test-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Test
        run: pytest -q

  # Regenerate and commit the committed SVG badges ONCE, from a single canonical
  # Python version, only on a push to main. Split out of the matrix so the badge is
  # deterministic and the git push does not race across five parallel jobs.
  # `!cancelled()` (not the default all-succeeded) so a red run still refreshes the
  # per-arch status badges to "failing" instead of leaving them stale-green.
  badges:
    needs: [test, test-arm, test-macos-arm, test-macos-intel]
    # inputs.skip-badges is only populated under workflow_call (empty/falsy on a
    # direct push), so this stays true for the push trigger and false when called
    # from auto-release as the release gate.
    if: >-
      !cancelled() && github.event_name == 'push' &&
      github.ref == 'refs/heads/main' && inputs.skip-badges != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: badges-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Test + coverage (single canonical run)
        run: >
          pytest -q --cov=src/protonfs --cov-report=xml:coverage.xml
          --junitxml=junit.xml -o junit_family=legacy
        continue-on-error: true

      - name: Lint status
        id: ruff
        run: |
          if ruff check src tests; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=failing" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Generate badges
        run: |
          mkdir -p .github/badges
          # coverage + docstring coverage
          genbadge coverage -i coverage.xml -o .github/badges/coverage.svg
          interrogate src/protonfs/ -g .github/badges/interrogate-badge.svg || true
          # pytest results (single canonical run, from junit.xml)
          genbadge tests -i junit.xml -o .github/badges/pytest.svg
          # ruff lint status
          if [ "${{ steps.ruff.outputs.status }}" = "passing" ]; then RC=brightgreen; else RC=red; fi
          curl -fsS -o .github/badges/ruff.svg \
            "https://img.shields.io/badge/ruff-${{ steps.ruff.outputs.status }}-${RC}?logo=ruff&logoColor=white"
          # supported python versions, sourced from the test matrix (single source of truth)
          PYVERS=$(python -c "import yaml; m=yaml.safe_load(open('.github/workflows/ci.yml'))['jobs']['test']['strategy']['matrix']['python-version']; print(' | '.join(m))")
          ENC=$(printf '%s' "$PYVERS" | sed 's/ /%20/g; s/|/%7C/g')
          curl -fsS -o .github/badges/pyversion.svg \
            "https://img.shields.io/badge/python-${ENC}-blue?logo=python&logoColor=white"
          # per-architecture build status, from the actual job results of this run
          arch_badge() {
            local file=$1 label=$2 result=$3 logo=$4
            if [ "$result" = "success" ]; then S=passing; C=brightgreen; else S=failing; C=red; fi
            curl -fsS -o ".github/badges/${file}.svg" \
              "https://img.shields.io/badge/${label}-${S}-${C}?logo=${logo}&logoColor=white"
          }
          arch_badge build-linux-x64 "linux--x64" "${{ needs.test.result }}" linux
          arch_badge build-linux-arm64 "linux--arm64" "${{ needs.test-arm.result }}" linux
          arch_badge build-darwin-arm64 "darwin--arm64" "${{ needs.test-macos-arm.result }}" apple
          arch_badge build-darwin-x64 "darwin--x64" "${{ needs.test-macos-intel.result }}" apple

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg .github/badges/interrogate-badge.svg \
                  .github/badges/pytest.svg .github/badges/ruff.svg .github/badges/pyversion.svg \
                  .github/badges/build-linux-x64.svg .github/badges/build-linux-arm64.svg \
                  .github/badges/build-darwin-x64.svg .github/badges/build-darwin-arm64.svg
          git diff --cached --quiet || git commit -m "chore: update CI badges [skip ci]"
          git push

name: Bug Investigation

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: write

# SECURITY: issue titles/bodies and comment bodies are attacker-controlled text.
# They must NEVER be spliced into `run:` scripts or github-script template
# literals via `${{ }}` (that is textual substitution BEFORE parsing — code
# injection). Every use below passes them through `env:` and reads them as
# `"$VAR"` (shell) or `process.env.VAR` (JS). Multi-line values written to
# GITHUB_OUTPUT use the heredoc delimiter form for the same reason.

jobs:
  investigate-bug:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'bug')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/investigate'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Add investigating comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 **Copilot is investigating this bug...**'
            })

      - name: Analyze bug with Copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
        run: |
          copilot -p "Analyze this GitHub issue and determine if it's a genuine bug that can be fixed with a patch, or if it's a feature request.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Description: ${ISSUE_BODY}

          Labels: ${ISSUE_LABELS}

          If it's a genuine bug, output exactly: BUG_CONFIRMED: [brief fix description]
          If it's NOT a bug, output exactly: NOT_A_BUG: [explanation]
          If unsure, output: UNCERTAIN: [clarifying questions]

          Be conservative - only confirm bugs that would clearly benefit from a code patch." \
            --allow-tool='shell(git:*,npm:*)' \
            --no-ask-user > investigation_result.txt
          cat investigation_result.txt

      - name: Parse investigation results
        id: parse
        run: |
          RESULT=$(cat investigation_result.txt)

          if [[ $RESULT == BUG_CONFIRMED:* ]]; then
            IS_BUG=true
            DESCRIPTION="${RESULT#BUG_CONFIRMED: }"
          elif [[ $RESULT == NOT_A_BUG:* ]]; then
            IS_BUG=false
            DESCRIPTION="${RESULT#NOT_A_BUG: }"
          else
            IS_BUG=uncertain
            DESCRIPTION="${RESULT#UNCERTAIN: }"
          fi
          echo "is_bug=$IS_BUG" >> "$GITHUB_OUTPUT"
          # Heredoc form: DESCRIPTION derives from model output over attacker text
          # and may span lines; a plain key=value write would let it inject outputs.
          {
            echo "fix_description<<PROTONFS_EOF"
            echo "$DESCRIPTION"
            echo "PROTONFS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate fix with Copilot (if confirmed bug)
        if: steps.parse.outputs.is_bug == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          FIX_DESCRIPTION: ${{ steps.parse.outputs.fix_description }}
        run: |
          copilot -p "You are a skilled software engineer. Generate a minimal, focused patch to fix this bug.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Description: ${ISSUE_BODY}

          Fix strategy: ${FIX_DESCRIPTION}

          Tasks:
          1. Examine the repository code
          2. Identify the files that need changes
          3. Create a focused fix (minimal changes, no refactoring)
          4. Output the exact files and changes needed

          Format your response as:
          FILES_TO_CHANGE:
          - file1.py: [description of changes]
          - file2.py: [description of changes]

          Then provide the actual code changes." \
            --allow-tool='shell(git:*,npm:*)' \
            --no-ask-user > fix_plan.txt
          cat fix_plan.txt

      - name: Update issue (bug confirmed)
        if: steps.parse.outputs.is_bug == 'true'
        uses: actions/github-script@v7
        env:
          FIX_DESCRIPTION: ${{ steps.parse.outputs.fix_description }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Bug Confirmed!**\n\n${process.env.FIX_DESCRIPTION}\n\nI've identified the fix. You can:\n- Review the fix strategy above\n- Comment with \`/investigate [alternative approach]\` to suggest a different fix\n- Create a PR based on the fix plan`
            })

      - name: Update issue (not a bug)
        if: steps.parse.outputs.is_bug == 'false'
        uses: actions/github-script@v7
        env:
          FIX_DESCRIPTION: ${{ steps.parse.outputs.fix_description }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Not a Bug (or Requires More Info)**\n\n${process.env.FIX_DESCRIPTION}\n\nThis doesn't appear to be a code bug. Consider:\n- Reframing as a feature request\n- Providing more reproduction steps\n- Checking documentation`
            })

      - name: Update issue (uncertain)
        if: steps.parse.outputs.is_bug == 'uncertain'
        uses: actions/github-script@v7
        env:
          FIX_DESCRIPTION: ${{ steps.parse.outputs.fix_description }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❓ **Need Clarification**\n\n${process.env.FIX_DESCRIPTION}\n\nPlease provide more details. After you respond, I can:\n- Re-analyze with more context\n- Propose a fix if confirmed as a bug`
            })

  handle-investigate-comment:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/investigate') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Add comment reaction
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })

      - name: Extract suggested approach
        id: extract
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          APPROACH=$(echo "$COMMENT_BODY" | sed 's|/investigate||g' | xargs)
          {
            echo "approach<<PROTONFS_EOF"
            echo "$APPROACH"
            echo "PROTONFS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate alternative fix
        if: steps.extract.outputs.approach != ''
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          APPROACH: ${{ steps.extract.outputs.approach }}
        run: |
          copilot -p "A user has suggested an alternative fix approach for this bug.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Description: ${ISSUE_BODY}

          User's suggested approach: ${APPROACH}

          Tasks:
          1. Evaluate the user's suggestion
          2. Generate a fix using their approach
          3. Explain how it differs from typical approaches
          4. Output the exact files and changes needed" \
            --allow-tool='shell(git:*,npm:*)' \
            --no-ask-user > alternative_fix.txt
          cat alternative_fix.txt

      - name: Comment with alternative fix
        if: steps.extract.outputs.approach != ''
        uses: actions/github-script@v7
        env:
          APPROACH: ${{ steps.extract.outputs.approach }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✨ **Alternative Approach Analyzed**\n\nI've analyzed your suggestion:\n> ${process.env.APPROACH}\n\nReview the alternative fix plan above and create a PR if it looks good!`
            })

name: Bug Investigation

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  investigate-bug:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'bug')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/investigate'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add investigating comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 **Copilot is investigating this bug...**'
            })

      - name: Copilot: Analyze bug and propose fix
        uses: copilot/tasks@v1
        id: investigate
        with:
          instructions: |
            You are a bug investigation assistant. Analyze this GitHub issue and determine if it describes a genuine bug that can be fixed with a patch.

            **Context:**
            - Issue: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Description: ${{ github.event.issue.body }}
            - Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}

            **Your task:**
            1. Analyze the issue to determine if this is a genuine bug (where a code patch would fix it) or a feature request.
            2. If it's a genuine bug:
               - Identify the root cause
               - Provide a detailed fix strategy
               - Output: "BUG_CONFIRMED: [brief description of fix]"
            3. If it's NOT a genuine bug (e.g., feature request, configuration issue, user error):
               - Explain why
               - Output: "NOT_A_BUG: [explanation]"
            4. If unsure, ask clarifying questions in the output.

            **Important:** Be conservative. Only confirm bugs that would clearly benefit from a code patch.

          repo-context: true

      - name: Parse investigation results
        id: parse
        run: |
          RESULT="${{ steps.investigate.outputs.result }}"
          
          if [[ $RESULT == BUG_CONFIRMED:* ]]; then
            echo "is_bug=true" >> $GITHUB_OUTPUT
            echo "fix_description=${RESULT#BUG_CONFIRMED: }" >> $GITHUB_OUTPUT
          elif [[ $RESULT == NOT_A_BUG:* ]]; then
            echo "is_bug=false" >> $GITHUB_OUTPUT
            echo "fix_description=${RESULT#NOT_A_BUG: }" >> $GITHUB_OUTPUT
          else
            echo "is_bug=uncertain" >> $GITHUB_OUTPUT
            echo "fix_description=$RESULT" >> $GITHUB_OUTPUT
          fi

      - name: Copilot: Generate fix (if confirmed bug)
        if: steps.parse.outputs.is_bug == 'true'
        uses: copilot/tasks@v1
        id: generate-fix
        with:
          instructions: |
            You are a skilled software engineer. Generate a minimal, focused patch to fix this bug.

            **Issue:** #${{ github.event.issue.number }} - ${{ github.event.issue.title }}
            **Description:** ${{ github.event.issue.body }}
            **Fix strategy:** ${{ steps.parse.outputs.fix_description }}

            **Your task:**
            1. Examine the repository code
            2. Create a focused fix (minimal changes, no refactoring)
            3. Include comments explaining the fix
            4. Ensure tests pass if applicable
            5. Output a summary of files changed

          repo-context: true
          create-pr: true
          pr-title: "fix: ${{ github.event.issue.title }}"
          pr-description: |
            Fixes #${{ github.event.issue.number }}

            ## Summary
            ${{ steps.parse.outputs.fix_description }}

            **Note:** This PR was automatically generated by Copilot bug investigation.
          pr-draft: false

      - name: Update issue with analysis (bug confirmed)
        if: steps.parse.outputs.is_bug == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Bug Confirmed!**

            ${{ steps.parse.outputs.fix_description }}

            I've generated a fix PR. You can:
            - Review and merge the PR
            - Comment with \`/investigate\` to suggest alternative approaches
            - Provide additional context for a different fix strategy`
            })

      - name: Update issue with analysis (not a bug)
        if: steps.parse.outputs.is_bug == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Not a Bug (or Requires More Info)**

            ${{ steps.parse.outputs.fix_description }}

            This doesn't appear to be a code bug that a patch would fix. Consider:
            - Reframing as a feature request
            - Providing more reproduction steps
            - Checking documentation`
            })

      - name: Update issue with analysis (uncertain)
        if: steps.parse.outputs.is_bug == 'uncertain'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❓ **Need Clarification**

            ${{ steps.parse.outputs.fix_description }}

            Please provide more details so I can better investigate. After you respond, I can:
            - Run \`/investigate\` again
            - Propose a fix if it's confirmed as a bug`
            })

  handle-investigate-comment:
    if: |
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '/investigate') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add comment reaction
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })

      - name: Extract suggested approach from comment
        id: extract-approach
        run: |
          COMMENT="${{ github.event.comment.body }}"
          APPROACH=$(echo "$COMMENT" | sed 's|/investigate||g' | xargs)
          echo "approach=$APPROACH" >> $GITHUB_OUTPUT

      - name: Copilot: Generate alternative fix
        if: steps.extract-approach.outputs.approach != ''
        uses: copilot/tasks@v1
        id: alt-fix
        with:
          instructions: |
            A user has suggested an alternative approach to fix this bug.

            **Issue:** #${{ github.event.issue.number }} - ${{ github.event.issue.title }}
            **Description:** ${{ github.event.issue.body }}
            **User's suggested approach:** ${{ steps.extract-approach.outputs.approach }}

            **Your task:**
            1. Evaluate the user's suggestion
            2. Generate a fix using their approach
            3. Create a PR with this alternative fix
            4. Explain how it differs from the original approach

          repo-context: true
          create-pr: true
          pr-title: "fix: ${{ github.event.issue.title }} (alternative approach)"
          pr-description: |
            Fixes #${{ github.event.issue.number }} (alternative approach)

            **User's suggested approach:** ${{ steps.extract-approach.outputs.approach }}

            **Note:** This is an alternative fix approach suggested in the issue discussion.
          pr-draft: false

      - name: Comment with alternative fix
        if: steps.extract-approach.outputs.approach != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✨ **Alternative Fix Generated**

            I've created a new PR using your suggested approach:
            > ${{ steps.extract-approach.outputs.approach }}

            You can now compare both approaches and choose which works best for your use case.`
            })

name: "Update Version Badge"
on:
  # The version comes from git tags (hatch-vcs), not pyproject.toml, so update the
  # badge when a release tag is pushed — and allow a manual run.
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  # Callable from auto-release.yml (the GITHUB_TOKEN-pushed tag can't trigger the
  # tag-push event above, so the merge-to-main path invokes this directly).
  workflow_call:

jobs:
  regenerate-version-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: version-badge
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # commit the badge to main even when triggered by a tag push
          fetch-depth: 0       # full history for the version tags
          fetch-tags: true     # fetch-depth:0 alone does not guarantee tags in checkout@v4
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and regenerate badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read the release version from the newest v* tag by version order (does
          # not depend on the tag being an ancestor of HEAD, unlike git describe).
          # pyproject.toml has no static version under hatch-vcs, so it can't be grepped.
          git fetch --tags --force --quiet
          VERSION=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1 | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            echo "No v* release tag on the remote yet — nothing to badge; skipping."
            exit 0
          fi
          echo "version: $VERSION"
          # shields.io message escaping: '-' -> '--', '_' -> '__'.
          BADGE_VERSION=$(printf '%s' "$VERSION" | sed 's/-/--/g; s/_/__/g')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p .github/badges
          curl -fsS -o .github/badges/version.svg \
            "https://img.shields.io/badge/version-${BADGE_VERSION}-blue?style=flat"

          git add .github/badges/version.svg
          git diff --cached --quiet || git commit -m "chore: update version badge [skip ci]"
          git push origin HEAD:main

name: "Update Version Badge"
on:
  # The version comes from git tags (hatch-vcs), not pyproject.toml, so update the
  # badge when a release tag is pushed — and allow a manual run.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  regenerate-version-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: version-badge
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # commit the badge to main even when triggered by a tag push
          fetch-depth: 0       # hatch-vcs / git describe need full history + tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and regenerate badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read the release version from the latest v* tag (ignores any stray
          # non-version tags), strip the leading 'v'. pyproject.toml has no static
          # version under hatch-vcs, so it cannot be grepped.
          VERSION=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            echo "No v* release tag found — aborting."
            exit 1
          fi
          echo "version: $VERSION"
          # shields.io message escaping: '-' -> '--', '_' -> '__'.
          BADGE_VERSION=$(printf '%s' "$VERSION" | sed 's/-/--/g; s/_/__/g')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p .github/badges
          curl -fsS -o .github/badges/version.svg \
            "https://img.shields.io/badge/version-${BADGE_VERSION}-blue?style=flat"

          git add .github/badges/version.svg
          git diff --cached --quiet || git commit -m "chore: update version badge [skip ci]"
          git push origin HEAD:main
